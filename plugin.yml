# Canonical descriptor for the moor plugin — edit here, never plugin.json.
# Projects into .claude-plugin/plugin.json (via scripts/gen-plugin-json.py) and
# the marketplace SPA (the suite: block).

name: moor
version: 0.10.0
description: A fast, keyboard-driven diff viewer for reviewing AI-generated code.
author: chris-peterson
repository: https://github.com/chris-peterson/moor
icon: docs/favicon.svg
license: MIT
keywords: [diff, difftool, git, code-review, electron]

# → marketplace.json entry
marketplace:
  category: development
  homepage: https://chris-peterson.github.io/moor/#/

# → marketplace SPA; keys mirror the SPA's PLUGINS object.
suite:
  ac: "--ship"
  cli: true
  group: create checkpoints
  # moor's docs site renders the live session preview, so the hub hands its
  # drill-in off to the spoke rather than showing the in-hub detail view.
  spoke: true
  gloss: To moor is to tie up alongside and look the hull over.
  pitch: "A tighter review loop — step through the AI's changes and send each rejection straight back to Claude."
  with: "anchor"
  what: "A fast diff viewer for reading code the AI wrote — step through it one change at a time, accept or reject each with a note. anchor opens whatever diff viewer git is set to use; moor is a quick one built for this, and it feeds your notes back to Claude in context."
  cmds:
    - ["/moor:moor", "Open a diff for review"]
  setup:
    head: "Use as your git diff tool"
    note: "moor isn't wired in by <code>claude plugin install</code>, and there's no CLI flag for it — it's a one-time git setting. <code>just git-install</code> builds the app and points git at moor: it sets <code>diff.tool</code> to <code>moor</code> and <code>difftool.moor.cmd</code> to moor's launcher. After that, <code>git difftool</code> — and anchor — open moor for review."
    cmd: "just git-install"
  # moor is an interactive review tool, not a set of slash-command skills, so the
  # examples are anchored on its core interactions — launching a review and the
  # per-change comment/reject flow that travels back to the agent.
  examples:
    - label: "review a diff"
      ac: "--ship"
      frames:
        - { t: you, text: "git difftool --dir-diff" }
        - { t: claude, text: "moor opens with the changed files in a sidebar — walk each change with j/k, mark it reviewed, and the exit code reflects the outcome." }
        - { t: status, text: "steps through the diff one change at a time, keyboard-first" }
    - label: "reject a change"
      ac: "--orange"
      frames:
        - { t: you, text: "Space" }
        - { t: claude, text: "Anchor a fix-now comment to the current change; on close, moor streams it back through MOOR_CONTEXT so the agent gets the rejection in context." }
        - { t: status, text: "sends each rejected hunk straight back to Claude as a concrete fix" }
  session:
    - { t: claude, text: "Refactored the date parser — here's the diff." }
    - { t: thought, text: "let me actually read it" }
    - { t: cmd, cmd: "/anchor:preview", out: "Opens the change in moor." }
    - { t: moor, del: "return new Date(s)", add: "return parseISO(s)", rej: "reject — non-ISO inputs still reach here → sent back as a fix" }
